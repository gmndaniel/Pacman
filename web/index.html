<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Pacman</title>
    <link rel="stylesheet" href="./styles.css?v=4">
  </head>
  <body>
    <main class="shell">
      <section class="game-stage" aria-label="Pacman browser game">
        <div class="topbar">
          <h1>Pacman</h1>
          <div class="actions" aria-label="Game actions">
            <button id="startButton" type="button">Start</button>
            <button id="pauseButton" type="button">Pause</button>
            <button id="muteButton" type="button" aria-pressed="false">Sound On</button>
            <button id="restartButton" type="button">Restart</button>
          </div>
        </div>

        <canvas id="game" width="550" height="600" role="img" aria-label="Pacman maze, pellets, ghosts, score, and lives"></canvas>

        <p id="status" class="sr-only" aria-live="polite">Ready</p>

        <div class="touch-pad" aria-label="Touch controls">
          <button type="button" data-dir="up" aria-label="Move up">&uarr;</button>
          <button type="button" data-dir="left" aria-label="Move left">&larr;</button>
          <button type="button" data-dir="down" aria-label="Move down">&darr;</button>
          <button type="button" data-dir="right" aria-label="Move right">&rarr;</button>
        </div>
      </section>
    </main>

    <script src="./game.js?v=8"></script>
  </body>
</html>
